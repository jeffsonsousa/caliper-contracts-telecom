test:
  name: telecom-marketplace
  description: Benchmarks W1–W11 for Telecom Marketplace on Besu
  workers:
    type: local
    number: 1

  rounds:
    - label: W5_CreateServiceRecordWithAssets
      description: CreateServiceRecordWithAssets (payload scaling)
      txNumber: 2
      rateControl: { type: fixed-rate, opts: { tps: 1 } }
      workload:
        module: benchmarks/telecom-marketplace/workloads/W5_CreateServiceRecordWithAssets.js
        arguments: {}

monitors:
  resource:
    - module: docker
      options:
        interval: 10
        cpuUsageNormalization: true # Normalizes CPU usage values to a 0-100% range
        containers:
          - /node1
          - /node2
          - /node3
          - /node4
          - /node5
          - /node6

        stats:
          memory:
            max: true
            avg: true
          cpu:
            max: true # Enable monitoring of max CPU usage
            avg: true # Enable monitoring of average CPU usage
          networkIO:
            enabled: true # Enable monitoring of network I/O
          diskIO:
            enabled: true # Enable monitoring of disk I/O

        charting:
          bar:
            metrics: [Memory(avg), CPU%(avg)]
          polar:
            metrics: [all]

observer:
  type: local
  interval: 5
